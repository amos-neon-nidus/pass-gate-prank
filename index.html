<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>安全验证</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #667085;
      --line: #d8dee8;
      --blue: #1a73e8;
      --blue-2: #1558b0;
      --cyan: #d9e8ff;
      --paper: #ffffff;
      --danger: #b42318;
      --danger-bg: #fff4f2;
      --shadow: 0 18px 45px rgba(24, 39, 75, 0.12);
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f4f6f9;
    }

    body::before,
    body::after {
      display: none;
    }

    body::before {
      content: none;
    }

    body::after {
      content: none;
    }

    button { font: inherit; }

    .topbar {
      width: min(1060px, calc(100% - 34px));
      margin: 0 auto;
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #344054;
      font-size: 15px;
      font-weight: 700;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--blue);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.16);
      font-size: 13px;
      font-weight: 800;
    }

    .top-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 7px;
      background: #fff;
      border: 1px solid var(--line);
      color: #475467;
      font-size: 12px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #21c976;
      box-shadow: 0 0 0 4px rgba(33, 201, 118, 0.12);
      animation: pulse 2.2s infinite;
    }

    .hero {
      width: min(760px, calc(100% - 34px));
      margin: 28px auto 20px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      border-radius: 0;
      font-size: 13px;
      font-weight: 650;
      color: #667085;
      background: transparent;
      border: 0;
    }

    .hero h1 {
      margin: 10px auto 8px;
      max-width: 680px;
      font-size: clamp(28px, 3.4vw, 36px);
      line-height: 1.14;
      font-weight: 760;
    }

    .gradient-text {
      background: none;
      color: inherit;
    }

    .hero p {
      margin: 0 auto;
      max-width: 700px;
      color: var(--muted);
      line-height: 1.65;
      font-size: clamp(14px, 1.9vw, 16px);
    }

    .micro-badges {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .micro-badge {
      padding: 6px 9px;
      border-radius: 6px;
      color: #667085;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 500;
    }

    .stage {
      width: min(1060px, calc(100% - 28px));
      margin: 28px auto 0;
      display: grid;
      grid-template-columns: minmax(190px, 245px) minmax(420px, 500px) minmax(190px, 245px);
      align-items: start;
      gap: 20px;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .glass-card {
      position: relative;
      overflow: hidden;
      padding: 17px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(24, 39, 75, 0.06);
    }

    .glass-card::after {
      content: none;
    }

    .card-kicker {
      color: #667085;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .glass-card h2 {
      margin: 7px 0 6px;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .glass-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .progress-row {
      margin-top: 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .progress-row strong {
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .progress-row span {
      color: #8a96a9;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .progress-track {
      height: 9px;
      margin-top: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf1f7;
    }

    .progress-bar {
      width: 67.4%;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
      transition: width 0.55s cubic-bezier(.2,.8,.2,1);
      box-shadow: none;
    }

    .mystery-result {
      margin-top: 14px;
      padding: 12px;
      border-radius: 7px;
      border: 1px dashed rgba(65, 100, 147, 0.2);
      background: #f8fafc;
    }

    .mystery-line {
      height: 11px;
      border-radius: 99px;
      background: linear-gradient(90deg, #d9e0ea, #eef2f6, #d9e0ea);
      background-size: 200% 100%;
      animation: shimmer 2.4s linear infinite;
    }

    .mystery-line + .mystery-line { margin-top: 9px; }
    .mystery-line.short { width: 66%; }

    .reward {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .reward-icon {
      flex: 0 0 auto;
      width: 45px;
      height: 45px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 800;
      background: #eef4ff;
      border: 1px solid #d9e8ff;
      box-shadow: none;
    }

    .reward strong { display: block; font-size: 15px; }
    .reward span { display: block; margin-top: 4px; color: #7c889a; font-size: 12px; }

    .attempt-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .attempt-number {
      min-width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      font-size: 24px;
      font-weight: 760;
      color: #146be1;
      background: #eef4ff;
      border: 1px solid #d9e8ff;
    }

    .quote-list {
      display: grid;
      gap: 11px;
      margin-top: 14px;
    }

    .quote {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #475467;
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      font-size: 12px;
      font-weight: 700;
    }

    .quote b { display: block; font-size: 12px; }
    .quote small { display: block; margin-top: 2px; color: #8591a4; line-height: 1.35; }

    .captcha-shell {
      position: relative;
      width: 100%;
      filter: none;
    }

    .captcha-panel {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: white;
      border: 1px solid #cfd6e4;
      box-shadow: var(--shadow);
      transform-origin: center;
    }

    .captcha-panel.shake { animation: shake .42s ease; }

    .captcha-header {
      min-height: 112px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      color: white;
      background: var(--blue);
    }

    .captcha-overline {
      opacity: 0.9;
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    .challenge-title {
      margin-top: 4px;
      font-size: 23px;
      line-height: 1.08;
      font-weight: 760;
      letter-spacing: 0;
    }

    .captcha-instruction {
      margin-top: 7px;
      opacity: 0.88;
      font-size: 12px;
      line-height: 1.5;
    }

    .shield {
      flex: 0 0 auto;
      width: 52px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: none;
    }

    .shield svg { width: 32px; height: 32px; }

    .captcha-grid {
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      background: #f2f4f7;
    }

    .tile {
      position: relative;
      aspect-ratio: 1.08 / 1;
      overflow: hidden;
      padding: 0;
      border: 0;
      border-radius: 4px;
      background: #d9e2ee;
      cursor: pointer;
      isolation: isolate;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }

    .tile:hover {
      z-index: 2;
      transform: scale(1.012);
      box-shadow: 0 6px 14px rgba(18, 48, 91, 0.14);
      filter: saturate(1.03);
    }

    .tile:focus-visible {
      outline: 3px solid rgba(26, 115, 232, 0.32);
      outline-offset: 2px;
      z-index: 3;
    }

    .tile :is(svg, img) {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      transition: transform .18s ease;
    }

    .tile.selected :is(svg, img) { transform: scale(0.88); }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 0 solid var(--blue);
      pointer-events: none;
      transition: border-width .12s ease;
    }

    .tile.selected::after { border-width: 4px; }

    .checkmark {
      position: absolute;
      z-index: 5;
      top: 7px;
      left: 7px;
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: var(--blue);
      box-shadow: 0 4px 12px rgba(12, 84, 185, 0.35);
      opacity: 0;
      transform: scale(.6);
      transition: opacity .13s ease, transform .13s ease;
    }

    .tile.selected .checkmark { opacity: 1; transform: scale(1); }

    .captcha-footer {
      min-height: 70px;
      padding: 12px 12px 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid #e4e7ec;
      background: #fff;
    }

    .tool-row { display: flex; gap: 4px; }

    .tool-btn {
      width: 39px;
      height: 39px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 7px;
      color: #6e7c91;
      background: transparent;
      cursor: pointer;
      transition: background .15s ease, color .15s ease, transform .15s ease;
    }

    .tool-btn:hover { color: #186fdc; background: #eef4ff; transform: translateY(-1px); }
    .tool-btn svg { width: 21px; height: 21px; }

    .verify-btn {
      min-width: 108px;
      min-height: 44px;
      padding: 0 21px;
      border: 0;
      border-radius: 7px;
      color: white;
      font-weight: 700;
      letter-spacing: 0;
      background: var(--blue);
      box-shadow: 0 8px 18px rgba(26, 115, 232, 0.2);
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
    }

    .verify-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 10px 22px rgba(26, 115, 232, 0.24);
    }

    .verify-btn:active:not(:disabled) { transform: translateY(0); }
    .verify-btn:disabled { cursor: wait; opacity: .72; }

    .error-ribbon {
      position: absolute;
      z-index: 20;
      left: 18px;
      right: 18px;
      top: 53%;
      min-height: 78px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 13px;
      border-radius: 8px;
      color: var(--danger);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #f3b7b1;
      border-left: 4px solid var(--danger);
      box-shadow: 0 14px 28px rgba(24, 39, 75, 0.16);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(.98);
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(8px);
    }

    .error-ribbon.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .error-icon {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: var(--danger);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      box-shadow: none;
    }

    .error-copy strong {
      display: block;
      font-size: clamp(21px, 3.2vw, 25px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .error-copy span {
      display: block;
      margin-top: 6px;
      color: #667085;
      font-size: 12px;
      font-weight: 500;
    }

    .error-copy small {
      display: block;
      margin-top: 4px;
      color: #8a3a33;
      font-size: 12px;
      line-height: 1.35;
    }

    .status-strip {
      margin: 12px auto 0;
      width: min(520px, 100%);
      min-height: 46px;
      padding: 10px 13px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 9px;
      border-radius: 8px;
      color: #56647a;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(24, 39, 75, 0.05);
      font-size: 13px;
      text-align: left;
    }

    .status-emoji {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--blue);
      background: #eef4ff;
      font-size: 12px;
      font-weight: 760;
    }
    #statusText { transition: opacity .2s ease; }

    .content-preview {
      width: min(980px, calc(100% - 34px));
      margin: 26px auto 0;
      padding: 20px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(24, 39, 75, 0.06);
    }

    .preview-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid #edf1f6;
    }

    .preview-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .preview-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .preview-lock {
      flex: 0 0 auto;
      padding: 6px 10px;
      border-radius: 999px;
      color: #1558b0;
      background: #eef4ff;
      border: 1px solid #d9e8ff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .preview-body {
      position: relative;
      margin-top: 18px;
      min-height: 170px;
      overflow: hidden;
    }

    .preview-blur {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 18px;
      filter: blur(5px);
      opacity: 0.72;
      pointer-events: none;
      user-select: none;
    }

    .preview-article,
    .preview-panel {
      min-height: 150px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e4e7ec;
      padding: 16px;
    }

    .preview-line {
      height: 11px;
      border-radius: 999px;
      background: #d8dee8;
    }

    .preview-line.title {
      width: 56%;
      height: 18px;
      background: #aab6c8;
    }

    .preview-line.short { width: 46%; }
    .preview-line.mid { width: 72%; }
    .preview-line + .preview-line { margin-top: 12px; }

    .preview-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .preview-tile {
      height: 54px;
      border-radius: 7px;
      background: linear-gradient(135deg, #d7dee9, #eef2f7);
    }

    .preview-veil {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.88));
    }

    .preview-veil strong {
      display: block;
      color: #344054;
      font-size: 15px;
    }

    .preview-veil span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    footer {
      width: min(980px, calc(100% - 34px));
      margin: 22px auto 26px;
      text-align: center;
      color: #8b96a7;
      font-size: 12px;
      line-height: 1.7;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      18% { transform: translateX(-8px) rotate(-.4deg); }
      36% { transform: translateX(7px) rotate(.35deg); }
      54% { transform: translateX(-5px); }
      72% { transform: translateX(4px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(.8); opacity: .7; }
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    @keyframes marquee {
      to { transform: translateX(-50%); }
    }

    @media (max-width: 980px) {
      .stage {
        grid-template-columns: minmax(0, 520px);
        justify-content: center;
      }
      .side-stack { display: none; }
      .hero { margin-top: 22px; }
    }

    @media (max-width: 560px) {
      .topbar {
        width: min(100% - 24px, 520px);
        min-height: 60px;
      }
      .top-pill { display: none; }
      .hero {
        width: min(100% - 24px, 520px);
        margin-top: 18px;
      }
      .hero h1 { font-size: 28px; }
      .hero p { font-size: 14px; }
      .stage { width: min(100% - 18px, 500px); margin-top: 22px; }
      .captcha-panel { border-radius: 8px; }
      .captcha-header { min-height: 98px; padding: 16px; }
      .challenge-title { font-size: 21px; }
      .shield { display: none; }
      .captcha-grid { padding: 6px; gap: 4px; }
      .captcha-footer { padding: 10px; }
      .tool-btn { width: 34px; height: 38px; }
      .verify-btn { min-width: 102px; padding: 0 15px; }
      .error-ribbon {
        left: 10px;
        right: 10px;
        min-height: 74px;
        padding: 13px 14px;
      }
      .error-icon { width: 32px; height: 32px; font-size: 22px; }
      .content-preview {
        width: min(100% - 18px, 500px);
        padding: 16px;
      }
      .preview-head {
        display: block;
      }
      .preview-lock {
        display: inline-block;
        margin-top: 10px;
      }
      .preview-blur {
        grid-template-columns: 1fr;
      }
      .preview-panel {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

    /* Independent pass verification page */
    body {
      min-height: 100vh;
      color: #202124;
      background: #f4f6f8;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .verification-page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 68px minmax(0, 1fr) auto;
      background: #f4f6f8;
    }

    .verification-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 max(28px, calc((100% - 1420px) / 2));
      background: #fff;
      border-bottom: 1px solid #d9dee7;
    }

    .verification-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #202124;
      font-size: 17px;
      font-weight: 600;
    }

    .verification-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #316bb7;
    }

    .verification-mark svg { width: 27px; height: 27px; }

    .verification-top-actions {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header-action {
      padding: 7px 2px;
      color: #4f5762;
      border: 0;
      background: transparent;
      font-size: 14px;
      cursor: default;
    }

    .verification-workspace {
      width: min(1320px, calc(100% - 48px));
      margin: 0 auto;
      padding: 42px 0 30px;
      display: grid;
      grid-template-columns: 270px minmax(480px, 540px) 270px;
      grid-template-areas: "access captcha note";
      align-items: center;
      justify-content: space-between;
      gap: 58px;
    }

    .access-check-card,
    .security-note-card {
      align-self: center;
      padding: 28px;
      background: #fff;
      border: 1px solid #d6dce6;
      border-radius: 7px;
      box-shadow: 0 5px 14px rgba(36, 49, 66, 0.04);
    }

    .access-check-card { grid-area: access; }
    .security-note-card { grid-area: note; }

    .access-check-card h1,
    .security-note-card h2 {
      margin: 0;
      color: #2d343e;
      font-size: 19px;
      font-weight: 650;
    }

    .access-check-card > p {
      margin: 18px 0 20px;
      color: #4d5663;
      font-size: 15px;
      line-height: 1.7;
    }

    .check-steps {
      display: grid;
      gap: 0;
      padding-top: 10px;
      border-top: 1px solid #e3e7ed;
    }

    .check-step {
      min-height: 62px;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      color: #5d6673;
      font-size: 15px;
    }

    .step-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      color: #aeb6c1;
      border: 1px solid #d9dfe7;
      border-radius: 50%;
      background: #fafbfd;
    }

    .step-icon svg { width: 21px; height: 21px; }

    .check-step b {
      color: #9aa3af;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .check-step.is-complete .step-icon,
    .check-step.is-current .step-icon {
      color: #fff;
      border-color: #3d82d9;
      background: #3d82d9;
    }

    .check-step.is-complete b { color: #279454; }
    .check-step.is-current { color: #353d48; font-weight: 600; }
    .check-step.is-current b { color: #3d82d9; }
    .check-step.is-running { color: #353d48; font-weight: 600; }
    .check-step.is-running .step-icon { color: #fff; border-color: #3d82d9; background: #3d82d9; }
    .check-step.is-running b { color: #3d82d9; }

    .verification-layer {
      grid-area: captcha;
      position: relative;
      z-index: auto;
      width: min(100%, 540px);
      justify-self: center;
      transform: none;
    }

    .captcha-shell { width: 100%; }

    .captcha-panel {
      width: 100%;
      overflow: hidden;
      border: 1px solid #cdd4de;
      border-radius: 7px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(40, 53, 72, 0.11);
    }

    .captcha-panel.shake { animation: none; }

    .captcha-header {
      min-height: 152px;
      display: block;
      padding: 27px 28px 22px;
      color: #fff;
      background: #347bd6;
    }

    .captcha-overline {
      opacity: .94;
      font-size: 17px;
      font-weight: 500;
    }

    .challenge-title {
      margin-top: 6px;
      font-size: 34px;
      line-height: 1.14;
      font-weight: 650;
    }

    .captcha-instruction {
      margin-top: 7px;
      opacity: .94;
      font-size: 16px;
      line-height: 1.45;
    }

    .shield { display: none; }

    .captcha-grid {
      padding: 7px;
      gap: 4px;
      background: #fff;
    }

    .captcha-puzzle-area { position: relative; }

    .tile {
      aspect-ratio: 1 / 1;
      border-radius: 0;
      background: #e5e9ef;
    }

    .tile-photo {
      width: 100%;
      height: 100%;
      display: block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      transition: transform .18s ease;
    }

    .tile:hover {
      transform: none;
      box-shadow: none;
      filter: none;
    }

    .tile.selected :is(svg, img),
    .tile.selected .tile-photo { transform: scale(.86); }
    .tile.selected::after { border-width: 4px; }

    .checkmark {
      top: 7px;
      left: 7px;
      width: 26px;
      height: 26px;
      color: #fff;
      background: #347bd6;
      box-shadow: 0 2px 7px rgba(30, 91, 170, .27);
    }

    .failure-modal {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(248, 250, 253, .78);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .failure-modal.show { opacity: 1; pointer-events: auto; }

    .failure-dialog {
      width: min(100%, 360px);
      padding: 20px;
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 12px;
      color: #aa241c;
      background: #fff;
      border: 1px solid #efbbb6;
      border-radius: 4px;
      box-shadow: 0 12px 30px rgba(47, 55, 67, .18);
    }

    .failure-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #bd2f26;
      border-radius: 50%;
      font-weight: 700;
    }

    .failure-copy strong { display: block; font-size: 16px; }
    .failure-copy span,
    .failure-copy small { display: block; margin-top: 5px; color: #4e5967; font-size: 13px; line-height: 1.45; }

    .retry-btn {
      grid-column: 1 / -1;
      min-height: 40px;
      margin-top: 6px;
      color: #fff;
      border: 0;
      border-radius: 3px;
      background: #347bd6;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .retry-btn:hover { background: #2e70c5; }

    .error-ribbon {
      position: static;
      max-height: 0;
      min-height: 0;
      margin: 0 7px;
      padding: 0 12px;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      color: #b3261e;
      background: #fff7f6;
      border: 1px solid #f4c7c3;
      border-radius: 2px;
      box-shadow: none;
      opacity: 0;
      transform: none;
      transition: max-height .18s ease, opacity .18s ease, padding .18s ease, margin .18s ease;
      pointer-events: none;
      backdrop-filter: none;
    }

    .error-ribbon.show {
      max-height: 112px;
      margin-top: 2px;
      margin-bottom: 7px;
      padding: 10px 12px;
      opacity: 1;
      transform: none;
    }

    .error-icon {
      width: 20px;
      height: 20px;
      margin-top: 1px;
      border-radius: 50%;
      color: #fff;
      background: #b3261e;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .error-copy strong { font-size: 13px; font-weight: 600; }
    .error-copy span,
    .error-copy small { margin-top: 2px; color: #5f6368; font-size: 12px; line-height: 1.45; font-weight: 400; }

    .captcha-footer {
      min-height: 78px;
      padding: 12px 16px;
      border-top: 1px solid #e5e8ed;
      background: #fff;
    }

    .tool-row { gap: 5px; }

    .tool-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: #606974;
      background: transparent;
    }

    .tool-btn:hover {
      color: #347bd6;
      background: #f1f5fb;
      transform: none;
    }

    .verify-btn {
      min-width: 132px;
      min-height: 48px;
      padding: 0 24px;
      border-radius: 3px;
      background: #347bd6;
      box-shadow: none;
      font-size: 17px;
      font-weight: 500;
    }

    .verify-btn:hover:not(:disabled) {
      transform: none;
      filter: none;
      background: #2e70c5;
      box-shadow: 0 1px 2px rgba(31, 41, 55, .24);
    }

    .support-note {
      margin-top: 13px;
      color: #66717d;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .hidden-metrics { display: none; }

    .security-note-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      color: #3d82d9;
      background: #eef5ff;
      border: 1px solid #d7e7fb;
      border-radius: 50%;
    }

    .security-note-icon svg { width: 21px; height: 21px; }
    .security-note-card h2 { margin-bottom: 12px; }

    .security-note-card > p {
      margin: 0 0 18px;
      padding-bottom: 17px;
      color: #687280;
      border-bottom: 1px solid #e5e8ed;
      font-size: 13px;
      line-height: 1.65;
    }

    .security-note-rule {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #55606e;
      font-size: 13px;
      line-height: 1.55;
    }

    .security-note-rule + .security-note-rule { margin-top: 11px; }
    .security-note-rule span { width: 6px; height: 6px; border-radius: 50%; background: #3d82d9; }

    .verification-footer {
      min-height: 106px;
      display: grid;
      place-content: center;
      gap: 12px;
      padding: 20px 24px;
      color: #66717d;
      background: #fff;
      border-top: 1px solid #d9dee7;
      font-size: 13px;
      text-align: center;
    }

    .verification-footer > div { display: flex; justify-content: center; gap: 32px; color: #818a95; }

    @media (max-width: 1150px) {
      .verification-workspace {
        width: min(920px, calc(100% - 40px));
        grid-template-columns: minmax(0, 540px) 260px;
        grid-template-areas: "captcha note";
        gap: 38px;
      }

      .access-check-card { display: none; }
    }

    @media (max-width: 780px) {
      .verification-page { grid-template-rows: 62px auto auto; }

      .verification-topbar { padding: 0 18px; }
      .verification-brand { font-size: 16px; }
      .verification-top-actions { gap: 12px; }
      .header-action { font-size: 13px; }

      .verification-workspace {
        width: min(540px, calc(100% - 24px));
        padding: 22px 0 28px;
        grid-template-columns: minmax(0, 1fr);
        grid-template-areas: "captcha" "access" "note";
        gap: 18px;
      }

      .access-check-card { display: block; }
      .access-check-card,
      .security-note-card { padding: 22px; }

      .captcha-header { min-height: 132px; padding: 22px; }
      .captcha-overline { font-size: 15px; }
      .challenge-title { font-size: 30px; }
      .captcha-instruction { font-size: 14px; }
      .captcha-footer { min-height: 70px; padding: 10px 12px; }
      .tool-btn { width: 38px; height: 38px; }
      .verify-btn { min-width: 104px; min-height: 43px; font-size: 16px; }
      .failure-dialog { padding: 16px; }
      .verification-footer { min-height: 96px; font-size: 12px; }
    }
  </style>
</head>

  <main class="verification-page">
    <header class="verification-topbar">
      <div class="verification-brand">
        <span class="verification-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3 19 6v5c0 4.4-2.6 7.8-7 10-4.4-2.2-7-5.6-7-10V6l7-3Z"/><path d="m9.1 12 1.9 1.9 4-4.2"/></svg>

                  <path d="M20 6v5h-5"/><path d="M4 18v-5h5"/><path d="M6.1 9A7 7 0 0 1 18.7 7.1L20 11M4 13l1.3 3.9A7 7 0 0 0 17.9 15"/>

            <button class="verify-btn" id="verifyBtn" type="button">验证</button>

      <div class="support-note" id="statusText" aria-live="polite">请根据图片内容完成当前验证。</div>
      <div class="hidden-metrics" aria-hidden="true">
        <span id="statusEmoji">i</span>
      </div>
    </section>

      <aside class="security-note-card">
        <div class="security-note-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 19 6v5c0 4.4-2.6 7.8-7 10-4.4-2.2-7-5.6-7-10V6l7-3Z"/><path d="M9 12h6M12 9v6"/></svg>

    const sheetPositions = [
      "0% 0%", "50% 0%", "100% 0%",
      "0% 50%", "50% 50%", "100% 50%",
      "0% 100%", "50% 100%", "100% 100%"
    ];

    function createSheetTiles(src, names) {
      return names.map((name, index) => ({
        name,
        src,
        backgroundSize: "300% 300%",
        backgroundPosition: sheetPositions[index]
      }));
    }

    const galleryGroups = [
      baseTileArt,
      createSheetTiles("assets/captcha/street-grid-a.png", [
        "城市斑马线", "人行横道标志", "红绿灯", "无障碍人行道", "步行街", "城市道路", "自行车道", "十字路口", "过街路缘"
      ]),
      createSheetTiles("assets/captcha/street-grid-b.png", [
        "社区人行横道", "安全岛", "蓝色过街标志", "林荫步道", "公交站", "蓝色自行车道", "城市交叉口", "傍晚信号灯", "盲道坡道"
      ])
    ];

    const prompts = ["人行横道", "交通信号灯", "小汽车", "行人", "道路标志", "自行车"];
    const statusMessages = [
      ["i", "验证未通过。检测结果：您是人机。请重新完成验证。"],
      ["i", "验证未通过，请重新选择图片后再次提交。"],
      ["i", "当前操作未通过安全验证，请重新完成验证。"],
      ["i", "系统未能确认真人访问特征，请再次验证。"]
    ];
    const failureReasons = [
      "点击轨迹过于稳定",
      "识别速度异常接近自动化行为",
      "选择结果与人类误差模型不匹配",
      "操作行为缺少正常犹豫时间"
    ];

    const grid = document.getElementById("captchaGrid");
    const panel = document.getElementById("captchaPanel");
    const verifyBtn = document.getElementById("verifyBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const audioBtn = document.getElementById("audioBtn");
    const infoBtn = document.getElementById("infoBtn");
    const failureModal = document.getElementById("failureModal");
    const retryBtn = document.getElementById("retryBtn");
    const challengeTitle = document.getElementById("challengeTitle");
    const statusText = document.getElementById("statusText");
    const statusEmoji = document.getElementById("statusEmoji");
    const failureText = document.getElementById("failureText");
    const failureReason = document.getElementById("failureReason");
    const checkSteps = [...document.querySelectorAll("[data-check-step]")];

    let attempts = 0;
    let galleryGroupIndex = 0;
    let isVerifying = false;

    function shuffle(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function renderTiles() {
      grid.innerHTML = "";
      shuffle(galleryGroups[galleryGroupIndex]).forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tile";
        button.setAttribute("aria-label", `图片：${item.name}`);
        button.setAttribute("aria-pressed", "false");
        const photo = document.createElement("span");
        photo.className = "tile-photo";
        photo.style.backgroundImage = `url("${item.src}")`;
        photo.style.backgroundSize = item.backgroundSize || "cover";
        photo.style.backgroundPosition = item.backgroundPosition || "center";

        const checkmark = document.createElement("span");
        checkmark.className = "checkmark";
        checkmark.setAttribute("aria-hidden", "true");
        checkmark.textContent = "✓";
        button.append(photo, checkmark);
        button.addEventListener("click", () => {
          if (isVerifying) return;
          button.classList.toggle("selected");
          button.setAttribute("aria-pressed", button.classList.contains("selected") ? "true" : "false");
        });
        grid.appendChild(button);
      });
    }

    function setStatus(emoji, text) {
      statusText.style.opacity = "0";
      setTimeout(() => {
        statusEmoji.textContent = emoji;
        statusText.textContent = text;
        statusText.style.opacity = "1";
      }, 130);
    }

    function setCheckStep(index, state) {
      const step = checkSteps[index];
      if (!step) return;

      step.classList.remove("is-complete", "is-current", "is-running");
      if (state !== "pending") step.classList.add(`is-${state}`);
      step.querySelector("b").textContent = {
        complete: "已完成",
        current: "进行中",
        running: "验证中",
        pending: "待完成"
      }[state];
    }

    function resetCheckSteps() {
      setCheckStep(0, "complete");
      setCheckStep(1, "current");
      setCheckStep(2, "pending");
    }

    function animateCheckSteps() {
      setCheckStep(0, "running");
      setCheckStep(1, "pending");
      setCheckStep(2, "pending");

      [260, 560, 860].forEach((delay, index) => {
        setTimeout(() => {
          setCheckStep(index, "complete");
          if (index < checkSteps.length - 1) setCheckStep(index + 1, "running");
        }, delay);
      });
    }

    function changeChallenge() {
      challengeTitle.textContent = prompts[(attempts + galleryGroupIndex) % prompts.length];
      renderTiles();
    }

    function runFakeVerification() {
      if (isVerifying) return;
      isVerifying = true;
      failureModal.classList.remove("show");
      verifyBtn.disabled = true;
      verifyBtn.textContent = "正在验证...";
      animateCheckSteps();
      setStatus("i", "正在验证，请稍候。");

      setTimeout(() => {
        attempts += 1;
        const reason = failureReasons[Math.floor(Math.random() * failureReasons.length)];
        const [emoji, message] = statusMessages[(attempts - 1) % statusMessages.length];
        failureText.textContent = "检测结果：您是人机。请重新完成验证。";
        failureReason.textContent = `原因：${reason}`;
        setStatus(emoji, message);

        failureModal.classList.add("show");
        verifyBtn.textContent = "验证";
        verifyBtn.disabled = false;
        isVerifying = false;
      }, 1120);
    }

    verifyBtn.addEventListener("click", runFakeVerification);

    retryBtn.addEventListener("click", () => {
      failureModal.classList.remove("show");
      galleryGroupIndex = (galleryGroupIndex + 1) % galleryGroups.length;
      resetCheckSteps();
      changeChallenge();
      setStatus("i", `已切换到第 ${galleryGroupIndex + 1} 组图片，请重新完成验证。`);
    });

    refreshBtn.addEventListener("click", () => {
      changeChallenge();
      setStatus("i", "图片已刷新，请重新选择符合条件的图片。");
    });

    audioBtn.addEventListener("click", () => {
      setStatus("i", "语音验证暂不可用，请继续完成图片验证。");
    });

    infoBtn.addEventListener("click", () => {
      setStatus("i", "帮助：选择所有符合题目要求的图片，然后点击验证。");
    });

    resetCheckSteps();
    renderTiles();
  </script>
</body>
</html>
